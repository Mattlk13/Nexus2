# Render Configuration
# Deploy backend to Render.com

services:
  - type: web
    name: nexus-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:fastapi_app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: R2_ENABLED
        value: true
      - key: CORS_ORIGINS
        value: "*"
