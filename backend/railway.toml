# Railway Configuration
# This file tells Railway how to build and run NEXUS backend

[build]
builder = "NIXPACKS"

[build.env]
PYTHON_VERSION = "3.11"

[deploy]
startCommand = "uvicorn server:fastapi_app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 300

[env]
# Set these in Railway dashboard:
# MONGO_URL
# DB_NAME
# EMERGENT_LLM_KEY
# CLOUDFLARE_ACCOUNT_ID
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# R2_ENDPOINT_URL
# R2_BUCKET_NAME
# ELEVENLABS_API_KEY
# FAL_KEY
# ANTHROPIC_API_KEY
# OPENAI_API_KEY
