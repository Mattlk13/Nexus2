# Cloudflare Pages Deployment Configuration

# Build configuration
[build]
  command = "cd frontend && yarn install && yarn build"
  publish = "frontend/build"

# Environment variables
[build.environment]
  NODE_VERSION = "18"
  YARN_VERSION = "1.22.0"

# Headers for security and optimization
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-api.com/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Functions (Cloudflare Workers)
[functions]
  directory = "functions"

# Preview deployments
[context.production]
  environment = { REACT_APP_ENV = "production" }

[context.preview]
  environment = { REACT_APP_ENV = "preview" }
